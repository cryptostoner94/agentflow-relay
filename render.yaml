services:
  - type: web
    name: agentflow-relay
    runtime: python
    plan: free

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

    buildCommand: |
      pip install --upgrade pip
      pip install fastapi uvicorn pydantic pydantic-settings python-dotenv requests httpx jinja2 aiofiles python-multipart websockets redis pytest

    startCommand: |
      PYTHONPATH=backend uvicorn app.main:app --host 0.0.0.0 --port $PORT

    autoDeploy: true
